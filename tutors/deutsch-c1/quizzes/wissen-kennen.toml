topic = "wissen vs. kennen"

[[questions]]
question = "_____ du meinen Bruder?"
choices = ["Kennst", "Weißt", "Kennt", "Weiß"]
correct = 0
explanation = "kennen = mit einer Person/einem Ort vertraut sein. Objekt ist hier eine Person (meinen Bruder)."

[[questions]]
question = "Er _____ Berlin sehr gut."
choices = ["weiß", "kennt", "weißt", "kennst"]
correct = 1
explanation = "kennen = vertraut sein mit Orten. Objekt ist ein Ort (Berlin)."

